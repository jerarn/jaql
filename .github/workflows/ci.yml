name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CC: gcc-13
  CXX: g++-13
  CI_CONAN_PROFILE: ci-gcc13

jobs:
  linux-gcc13:
    name: Linux GCC 13
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install --yes cmake ninja-build gcc-13 g++-13 lcov

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-gcc13-conan-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-gcc13-conan-

      - name: Install Conan
        run: python -m pip install --upgrade pip conan

      - name: Create Conan profile
        run: |
          mkdir -p "$HOME/.conan2/profiles"
          cat > "$HOME/.conan2/profiles/${CI_CONAN_PROFILE}" <<'EOF'
          [settings]
          arch=x86_64
          build_type=Debug
          compiler=gcc
          compiler.cppstd=23
          compiler.libcxx=libstdc++11
          compiler.version=13
          os=Linux
          EOF

      - name: Bootstrap ci-linux preset
        run: ./scripts/bootstrap.sh --preset ci-linux --host-profile "${CI_CONAN_PROFILE}" --build-profile "${CI_CONAN_PROFILE}"

      - name: Build
        run: cmake --build --preset ci-linux --parallel

      - name: Test
        run: ./scripts/test.sh --preset ci-linux

      - name: Generate coverage report
        run: cmake --build --preset ci-linux --target coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-linux-gcc13
          path: build/ci-linux/coverage
          if-no-files-found: error
