name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux-matrix:
    name: Linux ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "GCC 13 / Debug"
            cc: gcc-13
            cxx: g++-13
            conan_profile: ci-gcc13-debug
            conan_build_type: Debug
            conan_compiler: gcc
            conan_compiler_version: "13"
            conan_libcxx: libstdc++11
            cmake_preset: ci-gcc-debug
            apt_packages: cmake ninja-build gcc-13 g++-13 lcov
            coverage: true

          - name: "GCC 13 / Release"
            cc: gcc-13
            cxx: g++-13
            conan_profile: ci-gcc13-release
            conan_build_type: Release
            conan_compiler: gcc
            conan_compiler_version: "13"
            conan_libcxx: libstdc++11
            cmake_preset: ci-gcc-release
            apt_packages: cmake ninja-build gcc-13 g++-13
            coverage: false

          - name: "Clang 17 / Debug"
            cc: clang-17
            cxx: clang++-17
            conan_profile: ci-clang17-debug
            conan_build_type: Debug
            conan_compiler: clang
            conan_compiler_version: "17"
            conan_libcxx: libc++
            cmake_preset: ci-clang-debug
            apt_packages: cmake ninja-build clang-17 libc++-17-dev libc++abi-17-dev
            coverage: false

          - name: "Clang 17 / Release"
            cc: clang-17
            cxx: clang++-17
            conan_profile: ci-clang17-release
            conan_build_type: Release
            conan_compiler: clang
            conan_compiler_version: "17"
            conan_libcxx: libc++
            cmake_preset: ci-clang-release
            apt_packages: cmake ninja-build clang-17 libc++-17-dev libc++abi-17-dev
            coverage: false

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install --yes ${{ matrix.apt_packages }}

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-${{ matrix.conan_profile }}-conan-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.conan_profile }}-conan-

      - name: Install Conan
        run: python -m pip install --upgrade pip conan

      - name: Create Conan profile
        env:
          CONAN_PROFILE: ${{ matrix.conan_profile }}
          CONAN_BUILD_TYPE: ${{ matrix.conan_build_type }}
          CONAN_COMPILER: ${{ matrix.conan_compiler }}
          CONAN_COMPILER_VERSION: ${{ matrix.conan_compiler_version }}
          CONAN_LIBCXX: ${{ matrix.conan_libcxx }}
        run: |
          mkdir -p "$HOME/.conan2/profiles"
          cat > "$HOME/.conan2/profiles/${CONAN_PROFILE}" <<EOF
          [settings]
          arch=x86_64
          build_type=${CONAN_BUILD_TYPE}
          compiler=${CONAN_COMPILER}
          compiler.cppstd=23
          compiler.libcxx=${CONAN_LIBCXX}
          compiler.version=${CONAN_COMPILER_VERSION}
          os=Linux
          EOF

      - name: Bootstrap
        run: >
          ./scripts/bootstrap.sh
          --preset ${{ matrix.cmake_preset }}
          --host-profile ${{ matrix.conan_profile }}
          --build-profile ${{ matrix.conan_profile }}

      - name: Build
        run: cmake --build --preset ${{ matrix.cmake_preset }} --parallel

      - name: Test
        run: ./scripts/test.sh --preset ${{ matrix.cmake_preset }}

      - name: Detect coverage data
        id: coverage-data
        if: matrix.coverage
        run: |
          if find build/${{ matrix.cmake_preset }} -name '*.gcda' -print -quit | grep -q .; then
            echo 'found=true' >> "$GITHUB_OUTPUT"
          else
            echo 'found=false' >> "$GITHUB_OUTPUT"
            echo 'No .gcda files were produced; skipping coverage artifact generation.'
          fi

      - name: Generate coverage report
        if: matrix.coverage && steps.coverage-data.outputs.found == 'true'
        run: cmake --build --preset ${{ matrix.cmake_preset }} --target coverage

      - name: Upload coverage artifact
        if: matrix.coverage && steps.coverage-data.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-linux-gcc13-debug
          path: build/${{ matrix.cmake_preset }}/coverage
          if-no-files-found: error

  lint:
    name: Lint (format + clang-tidy)
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    env:
      CC: gcc-13
      CXX: g++-13

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install --yes cmake ninja-build gcc-13 g++-13 clang-format-17 clang-tidy-17

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-ci-gcc13-conan-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-ci-gcc13-conan-

      - name: Install Conan
        run: python -m pip install --upgrade pip conan

      - name: Create Conan profile
        run: |
          mkdir -p "$HOME/.conan2/profiles"
          cat > "$HOME/.conan2/profiles/ci-gcc13" <<'EOF'
          [settings]
          arch=x86_64
          build_type=Debug
          compiler=gcc
          compiler.cppstd=23
          compiler.libcxx=libstdc++11
          compiler.version=13
          os=Linux
          EOF

      - name: Bootstrap (configure only)
        run: >
          ./scripts/bootstrap.sh
          --preset ci-gcc-debug
          --host-profile ci-gcc13
          --build-profile ci-gcc13

      - name: Check formatting
        run: ./scripts/format.sh --check

      - name: Run clang-tidy
        run: ./scripts/lint.sh --preset ci-gcc-debug

